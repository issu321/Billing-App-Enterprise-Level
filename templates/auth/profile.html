{% extends "base.html" %}
{% block title %}Profile - {{ business_name }}{% endblock %}
{% block page_title %}Profile{% endblock %}
{% block content %}

<div class="liquid-glass rounded-2xl p-6 max-w-lg mx-auto">
    <div class="text-center mb-6">
        <div class="w-20 h-20 mx-auto rounded-full bg-gradient-to-br from-indigo-400 to-purple-500 flex items-center justify-center text-white text-2xl font-bold shadow-lg mb-3">{{ user.first_name[0] if user.first_name else user.username[0] }}</div>
        <h2 class="text-xl font-bold text-slate-800">{{ user.get_full_name() }}</h2>
        <p class="text-sm text-slate-500">{{ user.email }}</p>
    </div>
    <form method="POST" class="space-y-4">
        <div class="grid grid-cols-2 gap-4">
            <div><label class="block text-sm font-medium text-slate-700 mb-1">First Name</label><input type="text" name="first_name" value="{{ user.first_name or '' }}" class="w-full px-4 py-2 rounded-xl bg-white/60 border border-white/60 input-focus text-sm"></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1">Last Name</label><input type="text" name="last_name" value="{{ user.last_name or '' }}" class="w-full px-4 py-2 rounded-xl bg-white/60 border border-white/60 input-focus text-sm"></div>
        </div>
        <div><label class="block text-sm font-medium text-slate-700 mb-1">Email</label><input type="email" name="email" value="{{ user.email }}" class="w-full px-4 py-2 rounded-xl bg-white/60 border border-white/60 input-focus text-sm"></div>
        <div><label class="block text-sm font-medium text-slate-700 mb-1">Phone</label><input type="text" name="phone" value="{{ user.phone or '' }}" class="w-full px-4 py-2 rounded-xl bg-white/60 border border-white/60 input-focus text-sm"></div>
        <div><label class="block text-sm font-medium text-slate-700 mb-1">New Password (leave blank to keep)</label><input type="password" name="password" class="w-full px-4 py-2 rounded-xl bg-white/60 border border-white/60 input-focus text-sm"></div>
        <button type="submit" class="w-full py-2.5 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-medium hover:shadow-lg"><i class="fas fa-save mr-2"></i>Update Profile</button>
    </form>
</div>

{% endblock %}
