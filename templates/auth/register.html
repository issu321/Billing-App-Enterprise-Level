{% extends "base.html" %}
{% block title %}Register - {{ app_name }}{% endblock %}

{% block auth_content %}
<div class="min-h-screen flex items-center justify-center p-4 aurora-bg-soft">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <div class="w-20 h-20 mx-auto rounded-2xl bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 flex items-center justify-center shadow-2xl mb-4">
                <i class="fas fa-store text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold gradient-text">{{ app_name }}</h1>
            <p class="text-slate-500 mt-1">{% if first_user %}Create Admin Account{% else %}Register{% endif %}</p>
        </div>
        <div class="liquid-glass-strong rounded-2xl p-8 shadow-xl">
            <form method="POST" action="{{ url_for('auth.register') }}" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Username *</label>
                        <input type="text" name="username" required class="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/60 input-focus text-sm" placeholder="Username">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Email *</label>
                        <input type="email" name="email" required class="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/60 input-focus text-sm" placeholder="Email">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">First Name</label>
                        <input type="text" name="first_name" class="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/60 input-focus text-sm" placeholder="First Name">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Last Name</label>
                        <input type="text" name="last_name" class="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/60 input-focus text-sm" placeholder="Last Name">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Password *</label>
                    <input type="password" name="password" required class="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/60 input-focus text-sm" placeholder="Enter password">
                </div>
                <button type="submit" class="w-full py-3 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold hover:shadow-lg btn-glow">
                    {% if first_user %}Create Admin Account{% else %}Register{% endif %}
                </button>
            </form>
            <div class="mt-4 text-center">
                <a href="{{ url_for('auth.login') }}" class="text-sm text-indigo-600 hover:underline">Already have an account? Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
