{% extends "base.html" %}

{% block title %}Page Not Found{% endblock %}

{% block content %}
<div class="min-h-[60vh] flex items-center justify-center">
    <div class="liquid-glass rounded-2xl p-12 text-center max-w-md">
        <div class="w-24 h-24 mx-auto rounded-full bg-gradient-to-br from-red-400 to-pink-500 flex items-center justify-center mb-6">
            <i class="fas fa-exclamation-triangle text-white text-4xl"></i>
        </div>
        <h1 class="text-6xl font-bold gradient-text mb-2">404</h1>
        <h2 class="text-xl font-bold text-slate-800 mb-2">Page Not Found</h2>
        <p class="text-slate-500 mb-6">The page you are looking for doesn't exist or has been moved.</p>
        <a href="{{ url_for('dashboard.index') }}" class="inline-flex items-center gap-2 px-6 py-3 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-medium hover:shadow-lg btn-glow">
            <i class="fas fa-home mr-2"></i>Back to Dashboard
        </a>
    </div>
</div>
{% endblock %}
