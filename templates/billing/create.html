{% extends "base.html" %}
{% block title %}New Invoice - {{ business_name }}{% endblock %}
{% block page_title %}New Invoice{% endblock %}
{% block content %}

<div class="liquid-glass rounded-2xl p-6 max-w-3xl mx-auto">
    <h2 class="text-xl font-bold text-slate-800 mb-4">Create Invoice</h2>
    <form method="POST" action="{{ url_for('billing.create') }}" class="space-y-4">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div><label class="block text-sm font-medium text-slate-700 mb-1">Customer Name</label><input type="text" name="customer_name" class="w-full px-4 py-2 rounded-xl bg-white/60 border border-white/60 input-focus text-sm" placeholder="Walk-in Customer"></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1">Payment Method</label><select name="payment_method" class="w-full px-4 py-2 rounded-xl bg-white/60 border border-white/60 input-focus text-sm"><option value="cash">Cash</option><option value="card">Card</option><option value="upi">UPI</option></select></div>
        </div>
        <div class="flex justify-end pt-4">
            <button type="submit" class="px-6 py-2.5 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-medium hover:shadow-lg"><i class="fas fa-save mr-2"></i>Create Invoice</button>
        </div>
    </form>
</div>

{% endblock %}
