{% extends "base.html" %}

{% block title %}Add Customer - {{ business_name }}{% endblock %}
{% block page_title %}Add Customer{% endblock %}

{% block content %}
<div class="liquid-glass rounded-2xl p-6 max-w-2xl mx-auto">
    <h2 class="text-xl font-bold text-slate-800 mb-6">Add New Customer</h2>
    <form method="POST" class="space-y-4">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Customer Code</label><input type="text" name="customer_code" class="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/60 input-focus text-sm" placeholder="Auto-generated if empty"></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Name *</label><input type="text" name="name" required class="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/60 input-focus text-sm"></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Email</label><input type="email" name="email" class="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/60 input-focus text-sm"></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Phone</label><input type="text" name="phone" class="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/60 input-focus text-sm"></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">GST Number</label><input type="text" name="gst_number" class="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/60 input-focus text-sm font-mono"></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Customer Type</label><select name="customer_type" class="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/60 input-focus text-sm"><option value="retail">Retail</option><option value="wholesale">Wholesale</option><option value="corporate">Corporate</option></select></div>
        </div>
        <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Address</label><textarea name="address" rows="2" class="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/60 input-focus text-sm resize-none"></textarea></div>
        <div class="flex justify-end gap-3 pt-4 border-t border-slate-200/60">
            <a href="{{ url_for('customers.index') }}" class="px-6 py-2.5 rounded-xl bg-slate-100 text-slate-600 font-medium hover:bg-slate-200">Cancel</a>
            <button type="submit" class="px-6 py-2.5 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-medium hover:shadow-lg btn-glow"><i class="fas fa-save mr-2"></i>Save</button>
        </div>
    </form>
</div>
{% endblock %}
