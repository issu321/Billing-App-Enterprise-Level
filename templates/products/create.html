{% extends "base.html" %}

{% block title %}Add Product - {{ business_name }}{% endblock %}
{% block page_title %}Add Product{% endblock %}

{% block content %}
<div class="liquid-glass rounded-2xl p-6">
    <form method="POST" action="{{ url_for('products.create') }}" class="space-y-6">
        <!-- Basic Info -->
        <div>
            <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                <i class="fas fa-info-circle text-indigo-500"></i>Basic Information
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Product Name *</label>
                    <input type="text" name="name" required
                           class="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/60 input-focus text-sm"
                           placeholder="Enter product name">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">SKU *</label>
                    <input type="text" name="sku" required
                           class="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/60 input-focus text-sm font-mono"
                           placeholder="e.g., PROD-001">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Barcode</label>
                    <input type="text" name="barcode"
                           class="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/60 input-focus text-sm font-mono"
                           placeholder="Scan or enter barcode">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Description</label>
                    <textarea name="description" rows="3"
                              class="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/60 input-focus text-sm resize-none"
                              placeholder="Product description..."></textarea>
                </div>
            </div>
        </div>
        
        <!-- Categorization -->
        <div class="pt-6 border-t border-slate-200/60">
            <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                <i class="fas fa-tags text-indigo-500"></i>Categorization
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Category</label>
                    <select name="category_id" class="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/60 input-focus text-sm">
                        <option value="">Select Category</option>
                        {% for cat in categories %}
                        <option value="{{ cat.id }}">{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Brand</label>
                    <input type="text" name="brand"
                           class="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/60 input-focus text-sm"
                           placeholder="e.g., Apple, Samsung">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Unit</label>
                    <input type="text" name="unit" list="unit-suggestions"
                           class="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/60 input-focus text-sm"
                           placeholder="e.g., pcs, kg, box, dozen, packet">
                    <datalist id="unit-suggestions">
                        <option value="pcs">
                        <option value="kg">
                        <option value="box">
                        <option value="dozen">
                        <option value="packet">
                        <option value="litre">
                        <option value="gram">
                        <option value="meter">
                        <option value="bottle">
                        <option value="carton">
                    </datalist>
                </div>
            </div>
        </div>
        
        <!-- Pricing -->
        <div class="pt-6 border-t border-slate-200/60">
            <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                <i class="fas fa-rupee-sign text-indigo-500"></i>Pricing
            </h3>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Cost Price</label>
                    <input type="number" name="cost_price" step="0.01" min="0"
                           class="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/60 input-focus text-sm"
                           placeholder="0.00">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Selling Price *</label>
                    <input type="number" name="selling_price" step="0.01" min="0" required
                           class="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/60 input-focus text-sm"
                           placeholder="0.00">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">MRP</label>
                    <input type="number" name="mrp" step="0.01" min="0"
                           class="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/60 input-focus text-sm"
                           placeholder="0.00">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Tax Rate (%)</label>
                    <input type="number" name="tax_rate" step="0.01" min="0"
                           class="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/60 input-focus text-sm"
                           placeholder="18">
                </div>
            </div>
        </div>
        
        <!-- Inventory -->
        <div class="pt-6 border-t border-slate-200/60">
            <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2">
                <i class="fas fa-warehouse text-indigo-500"></i>Inventory
            </h3>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Opening Stock</label>
                    <input type="number" name="opening_stock" step="0.01" min="0" value="0"
                           class="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/60 input-focus text-sm">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1.5">Reorder Level</label>
                    <input type="number" name="reorder_level" step="0.01" min="0" value="10"
                           class="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/60 input-focus text-sm">
                </div>
                <div class="flex items-center pt-6">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" name="track_inventory" checked class="w-5 h-5 rounded border-slate-300 text-indigo-600 focus:ring-indigo-500">
                        <span class="text-sm font-medium text-slate-700">Track Inventory</span>
                    </label>
                </div>
            </div>
        </div>
        
        <!-- Actions -->
        <div class="pt-6 border-t border-slate-200/60 flex items-center justify-end gap-3">
            <a href="{{ url_for('products.index') }}" class="px-6 py-2.5 rounded-xl bg-slate-100 text-slate-600 font-medium hover:bg-slate-200 transition-colors">
                Cancel
            </a>
            <button type="submit" class="px-6 py-2.5 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-medium hover:shadow-lg transition-all btn-glow">
                <i class="fas fa-save mr-2"></i>Save Product
            </button>
        </div>
    </form>
</div>
{% endblock %}
