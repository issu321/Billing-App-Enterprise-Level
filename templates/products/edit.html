{% extends "base.html" %}
{% block title %}Edit Product - {{ business_name }}{% endblock %}
{% block page_title %}Edit Product{% endblock %}
{% block content %}

<div class="liquid-glass rounded-2xl p-6 max-w-2xl mx-auto">
    <h2 class="text-xl font-bold text-slate-800 mb-4">Edit Product</h2>
    <form method="POST" class="space-y-4">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Name</label>
                <input type="text" name="name" value="{{ product.name }}" required class="w-full px-4 py-2 rounded-xl bg-white/60 border border-white/60 input-focus text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">SKU</label>
                <input type="text" name="sku" value="{{ product.sku }}" required class="w-full px-4 py-2 rounded-xl bg-white/60 border border-white/60 input-focus text-sm font-mono">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Selling Price</label>
                <input type="number" name="selling_price" value="{{ product.selling_price }}" step="0.01" required class="w-full px-4 py-2 rounded-xl bg-white/60 border border-white/60 input-focus text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Cost Price</label>
                <input type="number" name="cost_price" value="{{ product.cost_price }}" step="0.01" class="w-full px-4 py-2 rounded-xl bg-white/60 border border-white/60 input-focus text-sm">
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Unit</label>
                <input type="text" name="unit" value="{{ product.unit.name if product.unit else '' }}" list="unit-suggestions"
                       class="w-full px-4 py-2 rounded-xl bg-white/60 border border-white/60 input-focus text-sm"
                       placeholder="e.g., pcs, kg, box">
                <datalist id="unit-suggestions">
                    <option value="pcs">
                    <option value="kg">
                    <option value="box">
                    <option value="dozen">
                    <option value="packet">
                    <option value="litre">
                    <option value="gram">
                    <option value="meter">
                    <option value="bottle">
                    <option value="carton">
                </datalist>
            </div>
            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">MRP</label>
                <input type="number" name="mrp" value="{{ product.mrp }}" step="0.01" class="w-full px-4 py-2 rounded-xl bg-white/60 border border-white/60 input-focus text-sm">
            </div>
        </div>
        <div class="flex justify-end gap-3 pt-4">
            <a href="{{ url_for('products.index') }}" class="px-6 py-2 rounded-xl bg-slate-100 text-slate-600 font-medium hover:bg-slate-200">Cancel</a>
            <button type="submit" class="px-6 py-2 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-medium hover:shadow-lg"><i class="fas fa-save mr-2"></i>Update</button>
        </div>
    </form>
</div>

{% endblock %}
