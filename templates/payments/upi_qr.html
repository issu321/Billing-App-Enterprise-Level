{% extends "base.html" %}
{% block title %}UPI QR - {{ business_name }}{% endblock %}
{% block page_title %}UPI QR{% endblock %}
{% block content %}

<div class="liquid-glass rounded-2xl p-6 max-w-lg mx-auto">
    <h3 class="text-lg font-bold text-slate-800 mb-4"><i class="fas fa-qrcode text-indigo-500 mr-2"></i>Generate UPI QR</h3>
    <div class="space-y-4">
        <div><label class="block text-sm font-medium text-slate-700 mb-1">UPI ID</label><input type="text" id="upiId" class="w-full px-4 py-2 rounded-xl bg-white/60 border border-white/60 input-focus text-sm" placeholder="name@upi"></div>
        <div><label class="block text-sm font-medium text-slate-700 mb-1">Payee Name</label><input type="text" id="upiName" class="w-full px-4 py-2 rounded-xl bg-white/60 border border-white/60 input-focus text-sm" placeholder="Business Name"></div>
        <div><label class="block text-sm font-medium text-slate-700 mb-1">Amount (Optional)</label><input type="number" id="upiAmount" step="0.01" class="w-full px-4 py-2 rounded-xl bg-white/60 border border-white/60 input-focus text-sm" placeholder="0.00"></div>
        <button onclick="generateUPIQR()" class="w-full py-2.5 rounded-xl bg-gradient-to-r from-emerald-500 to-teal-500 text-white font-medium hover:shadow-lg">Generate QR</button>
        <div id="upiResult" class="text-center py-4 hidden"><img id="upiImage" src="" alt="UPI QR" class="mx-auto max-w-[200px]"><p class="text-sm text-slate-500 mt-2">Scan with any UPI app</p></div>
    </div>
</div>
<script>
async function generateUPIQR() {
    const upiId = document.getElementById('upiId').value;
    const name = document.getElementById('upiName').value;
    const amount = document.getElementById('upiAmount').value;
    if (!upiId) return alert('Please enter UPI ID');
    try {
        const response = await fetch('{{ url_for("barcode.generate_upi_qr") }}', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({upi_id: upiId, name, amount})
        });
        const data = await response.json();
        if (data.success) { document.getElementById('upiImage').src = data.data; document.getElementById('upiResult').classList.remove('hidden'); }
    } catch (e) { alert('Error generating QR'); }
}
</script>

{% endblock %}
