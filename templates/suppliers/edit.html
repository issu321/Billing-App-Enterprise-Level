{% extends "base.html" %}
{% block title %}Edit Supplier - {{ business_name }}{% endblock %}
{% block page_title %}Edit Supplier{% endblock %}
{% block content %}

<div class="liquid-glass rounded-2xl p-6 max-w-2xl mx-auto">
    <h2 class="text-xl font-bold text-slate-800 mb-4">Edit Supplier</h2>
    <form method="POST" class="space-y-4">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div><label class="block text-sm font-medium text-slate-700 mb-1">Name *</label><input type="text" name="name" value="{{ supplier.name }}" required class="w-full px-4 py-2 rounded-xl bg-white/60 border border-white/60 input-focus text-sm"></div>
            <div><label class="block text-sm font-medium text-slate-700 mb-1">Phone</label><input type="text" name="phone" value="{{ supplier.phone or '' }}" class="w-full px-4 py-2 rounded-xl bg-white/60 border border-white/60 input-focus text-sm"></div>
        </div>
        <div class="flex justify-end gap-3 pt-4">
            <a href="{{ url_for('suppliers.index') }}" class="px-6 py-2 rounded-xl bg-slate-100 text-slate-600 font-medium hover:bg-slate-200">Cancel</a>
            <button type="submit" class="px-6 py-2 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-medium hover:shadow-lg"><i class="fas fa-save mr-2"></i>Update</button>
        </div>
    </form>
</div>

{% endblock %}
