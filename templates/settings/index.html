{% extends "base.html" %}

{% block title %}Settings - {{ business_name }}{% endblock %}
{% block page_title %}Settings{% endblock %}

{% block content %}
<div class="liquid-glass rounded-2xl overflow-hidden">
    <form method="POST" action="{{ url_for('settings.update') }}" class="p-6 space-y-8">
        <!-- Business Info -->
        <div>
            <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><i class="fas fa-building text-indigo-500"></i>Business Information</h3>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Business Name</label><input type="text" name="business_name" value="{{ settings.business_name or '' }}" class="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/60 input-focus text-sm"></div>
                <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Store Name</label><input type="text" name="store_name" value="{{ settings.store_name or '' }}" class="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/60 input-focus text-sm"></div>
                <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Tagline</label><input type="text" name="tagline" value="{{ settings.tagline or '' }}" class="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/60 input-focus text-sm"></div>
                <div><label class="block text-sm font-medium text-slate-700 mb-1.5">GST Number</label><input type="text" name="gst_number" value="{{ settings.gst_number or '' }}" class="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/60 input-focus text-sm font-mono"></div>
                <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Phone</label><input type="text" name="phone" value="{{ settings.phone or '' }}" class="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/60 input-focus text-sm"></div>
                <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Email</label><input type="email" name="email" value="{{ settings.email or '' }}" class="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/60 input-focus text-sm"></div>
                <div class="sm:col-span-2"><label class="block text-sm font-medium text-slate-700 mb-1.5">Address</label><textarea name="address" rows="2" class="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/60 input-focus text-sm resize-none">{{ settings.address or '' }}</textarea></div>
            </div>
        </div>
        
        <!-- Invoice Settings -->
        <div class="pt-6 border-t border-slate-200/60">
            <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><i class="fas fa-file-invoice text-indigo-500"></i>Invoice Settings</h3>
            <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Invoice Prefix</label><input type="text" name="invoice_prefix" value="{{ settings.invoice_prefix or 'INV' }}" class="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/60 input-focus text-sm"></div>
                <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Starting Number</label><input type="number" name="invoice_starting_number" value="{{ settings.invoice_starting_number or 1 }}" class="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/60 input-focus text-sm"></div>
                <div><label class="block text-sm font-medium text-slate-700 mb-1.5">Default Tax Rate (%)</label><input type="number" name="default_tax_rate" step="0.01" value="{{ "%.2f"|format(settings.default_tax_rate) if settings.default_tax_rate else '0' }}" class="w-full px-4 py-2.5 rounded-xl bg-white/60 border border-white/60 input-focus text-sm"></div>
            </div>
            <div class="mt-4 flex flex-wrap gap-4">
                <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" name="show_logo_on_invoice" {{ 'checked' if settings.show_logo_on_invoice }} class="w-4 h-4 rounded border-slate-300 text-indigo-600"><span class="text-sm text-slate-700">Show logo on invoice</span></label>
                <label class="flex items-center gap-2 cursor-pointer"><input type="checkbox" name="tax_inclusive_pricing" {{ 'checked' if settings.tax_inclusive_pricing }} class="w-4 h-4 rounded border-slate-300 text-indigo-600"><span class="text-sm text-slate-700">Tax inclusive pricing</span></label>
            </div>
        </div>
        
        <!-- Features -->
        <div class="pt-6 border-t border-slate-200/60">
            <h3 class="text-lg font-bold text-slate-800 mb-4 flex items-center gap-2"><i class="fas fa-toggle-on text-indigo-500"></i>Features</h3>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-3">
                <label class="flex items-center gap-3 p-3 rounded-xl bg-white/40 cursor-pointer hover:bg-white/60 transition-colors"><input type="checkbox" name="enable_pos" {{ 'checked' if settings.enable_pos }} class="w-5 h-5 rounded border-slate-300 text-indigo-600"><span class="text-sm text-slate-700">Enable POS</span></label>
                <label class="flex items-center gap-3 p-3 rounded-xl bg-white/40 cursor-pointer hover:bg-white/60 transition-colors"><input type="checkbox" name="enable_inventory_tracking" {{ 'checked' if settings.enable_inventory_tracking }} class="w-5 h-5 rounded border-slate-300 text-indigo-600"><span class="text-sm text-slate-700">Inventory Tracking</span></label>
                <label class="flex items-center gap-3 p-3 rounded-xl bg-white/40 cursor-pointer hover:bg-white/60 transition-colors"><input type="checkbox" name="enable_barcode" {{ 'checked' if settings.enable_barcode }} class="w-5 h-5 rounded border-slate-300 text-indigo-600"><span class="text-sm text-slate-700">Barcode Support</span></label>
                <label class="flex items-center gap-3 p-3 rounded-xl bg-white/40 cursor-pointer hover:bg-white/60 transition-colors"><input type="checkbox" name="enable_qr_payments" {{ 'checked' if settings.enable_qr_payments }} class="w-5 h-5 rounded border-slate-300 text-indigo-600"><span class="text-sm text-slate-700">QR Payments</span></label>
                <label class="flex items-center gap-3 p-3 rounded-xl bg-white/40 cursor-pointer hover:bg-white/60 transition-colors"><input type="checkbox" name="enable_negative_stock" {{ 'checked' if settings.enable_negative_stock }} class="w-5 h-5 rounded border-slate-300 text-indigo-600"><span class="text-sm text-slate-700">Allow Negative Stock</span></label>
                <label class="flex items-center gap-3 p-3 rounded-xl bg-white/40 cursor-pointer hover:bg-white/60 transition-colors"><input type="checkbox" name="enable_multi_warehouse" {{ 'checked' if settings.enable_multi_warehouse }} class="w-5 h-5 rounded border-slate-300 text-indigo-600"><span class="text-sm text-slate-700">Multi Warehouse</span></label>
            </div>
        </div>
        
        <div class="pt-6 border-t border-slate-200/60 flex justify-end">
            <button type="submit" class="px-8 py-3 rounded-xl bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold hover:shadow-lg btn-glow"><i class="fas fa-save mr-2"></i>Save Settings</button>
        </div>
    </form>
</div>
{% endblock %}
